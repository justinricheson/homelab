---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}-external
  namespace: {{ .Release.Namespace }}
  annotations:
    metallb.universe.tf/address-pool: default-pool
spec:
  selector:
    app: {{ .Values.app.name }}
  type: LoadBalancer
  loadBalancerIP: {{ .Values.service.ip }}
  ports:
  - name: mqtt
    port: 8883
    targetPort: 8883

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.app.name }}
  type: ClusterIP
  ports:
  - name: mqtt
    port: 1883
    targetPort: 1883