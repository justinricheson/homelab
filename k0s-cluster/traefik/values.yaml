ports:
  web:
    port: 9080
    nodePort: 30000

  websecure:
    port: 9443
    nodePort: 30001

api:
  dashboard: true
  insecure: false

ingressClass:
  enabled: true

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`home.justinricheson.com`)
    entryPoints:
      - websecure
    tls:
      secretName: traefik-tls

service:
  type: LoadBalancer
  loadBalancerIP: 10.10.0.10
  annotations:
    metallb.universe.tf/address-pool: default-pool

providers:
  kubernetesIngress:
    enabled: true

  kubernetesGateway:
    enabled: false

metrics:
  prometheus:
    enabled: true

additionalArguments:
  # I can't figure out any other way to get https backends working
  # Traefik's service annotations to specify a custom ServerTransport are not working
  - "--serversTransport.insecureSkipVerify=true"

  # HTTPS redirect (replaces deprecated ports.web.redirections)
  - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
  - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
  - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

  # Logging (replaces removed logs section)
  - "--log.level=DEBUG"
  - "--accesslog=true"